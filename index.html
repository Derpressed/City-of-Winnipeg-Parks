<!DOCTYPE html>

<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Park Reservations City of Winnipeg</title>
        
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
        
        
        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
            integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
            crossorigin=""/>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&display=swap" rel="stylesheet">
         <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    </head>

    <body>

        
        <div id="container">
            <div id="inner-container">
                <img id="maple-background" src="images/maple-leaves.jpg" alt="Maple-Background-Photo">  
                <div id="main-hotbar">
                    <button id="hotbar-search-button">
                        <img id="hotbar-search" src="images/white-magnifying-glass.png" alt="Magnifying-glass">
                    </button>
                    <input id="outer-search-input" type="text">
                </div>
                <div id="text-container">
                    <h1 class="parks-title">
                        PARKS
                    </h1>
                    <div>
                        <button id="text-search">
                            <img src="images/white-magnifying-glass.png" alt="">
                            <span>search</span>
                        </button>
                        <input id="inner-search-input" type="text">
                
                

                        <button id="text-map">
                            <img src="images/black-map.png" alt="">
                            <span>map</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="container-map">
            <div id="map-page-hotbar">
                <button id="map-page-search">
                    <img id="map-page-search-img" src="images/white-magnifying-glass.png" alt="Magnifying-glass">
                </button>
                <input id="map-page-search-text" type="text">
                <button class="parks-title-hotbar">PARKS</button>
            </div>
            <div id="inner-container-map">
                <div id="map">

                </div>      
                <div id="map-options-parent">
                    <button id="colour-mode-button">
                        <div id="colour-mode-button-display">
                            
                        </div>
                    </button>
                    <button id="map-origin-button">
                        <img id=origin-icon src="images/origin-icon.png">
                    </button>
                </div>
            </div>
        </div>




        <script src="scripts/constants.js"></script>
        <script src="scripts/transition.js"></script>
        <script src="scripts/searchButton.js"></script>
        <script src="scripts/textSearch.js"></script>
        <script src="scripts/testMap.js"></script>
        <script src="scripts/mapOptions.js"></script>
        <script src="scripts/dataFetch.js"></script>
    </body>


</html>
